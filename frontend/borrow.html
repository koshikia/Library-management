<!DOCTYPE html>
<html>
<head>
<title>Mượn sách</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    width:350px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;
}

input:focus{
    border-color:#007bff;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h2>Mượn sách</h2>

<input id="docGiaId" placeholder="ID độc giả">

<input id="maVach" placeholder="Mã vạch sách">

<button onclick="handleBorrow()">Mượn sách</button>

</div>


<script src="js/api.js"></script>

<script>

async function handleBorrow(){

    const docGiaId = document.getElementById("docGiaId").value;
    const maVach = document.getElementById("maVach").value;

    const data = await borrowBook(docGiaId, maVach);

    alert(data.message);

}

</script>

</body>
</html>
