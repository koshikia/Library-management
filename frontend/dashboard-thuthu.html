<!DOCTYPE html>
<html>
<head>
<title>Dashboard Thủ Thư</title>
</head>

<body>

<h1>Dashboard Thủ Thư</h1>

<h3 id="userName"></h3>

<hr>

<button onclick="showBorrow()">Mượn sách</button>

<button onclick="showReturn()">Trả sách</button>

<button onclick="loadBorrows()">Xem phiếu mượn</button>

<button onclick="logout()">Đăng xuất</button>

<hr>

<div id="content"></div>

<script>

async function getUser(){

 const res = await fetch("/api/me",{credentials:"include"});

 if(res.status !== 200){
    window.location.href="/login.html"
 }

 const user = await res.json();

 document.getElementById("userName").innerText =
   "Xin chào: " + user.hoTen;

}

getUser();


// ---------------- BORROW ----------------

function showBorrow(){

document.getElementById("content").innerHTML = `
<h2>Mượn sách</h2>

<input id="docGiaId" placeholder="ID độc giả">
<br><br>

<input id="maVach" placeholder="Mã vạch sách">
<br><br>

<button onclick="borrowBook()">Mượn</button>
`;

}

async function borrowBook(){

 const docGiaId = document.getElementById("docGiaId").value
 const maVach = document.getElementById("maVach").value

 const res = await fetch("/api/borrows",{
   method:"POST",
   headers:{ "Content-Type":"application/json" },
   credentials:"include",
   body:JSON.stringify({docGiaId,maVach})
 })

 const data = await res.json()

 alert(data.message)

}


// ---------------- RETURN ----------------

function showReturn(){

document.getElementById("content").innerHTML = `
<h2>Trả sách</h2>

<input id="maVach" placeholder="Mã vạch sách">

<button onclick="returnBook()">Trả sách</button>
`;

}

async function returnBook(){

 const maVach = document.getElementById("maVach").value

 const res = await fetch("/api/return",{
   method:"POST",
   headers:{ "Content-Type":"application/json"},
   credentials:"include",
   body:JSON.stringify({maVach})
 })

 const data = await res.json()

 alert(data.message)

}


// ---------------- BORROW LIST ----------------

async function loadBorrows(){

 const res = await fetch("/api/borrows/all",{
    credentials:"include"
 })

 const borrows = await res.json()

 let html = `
<h2>Danh sách phiếu mượn</h2>

<table border="1">
<tr>
<th>ID</th>
<th>Độc giả</th>
<th>Sách</th>
<th>Hạn trả</th>
<th>Gia hạn</th>
</tr>
`

 borrows.forEach(b => {

let action = ""

if(b.trangThaiGiaHan === "CHO_DUYET"){

action = `
<button onclick="approve(${b.giaHanId})">Đồng ý</button>
<button onclick="reject(${b.giaHanId})">Từ chối</button>
`

}

html += `
<tr>
<td>${b.id}</td>
<td>${b.hoTen}</td>
<td>${b.tenSach}</td>
<td>${b.maVach}</td>
<td>${b.hanTra}</td>
<td>${action}</td>
</tr>
`

})

 html += "</table>"

 document.getElementById("content").innerHTML = html

}


// ---------------- APPROVE ----------------

async function approve(id){

 const res = await fetch("/api/renew/approve",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  credentials:"include",
  body:JSON.stringify({giaHanId:id})
 })

 const data = await res.json()

 alert(data.message)

 loadBorrows()

}


// ---------------- REJECT ----------------

async function reject(id){

 const res = await fetch("/api/renew/reject",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  credentials:"include",
  body:JSON.stringify({giaHanId:id})
 })

 const data = await res.json()

 alert(data.message)

 loadBorrows()

}


// ---------------- LOGOUT ----------------

async function logout(){

 await fetch("/api/logout",{
   method:"POST",
   credentials:"include"
 })

 window.location.href="/login.html"

}

</script>

</body>
</html>
