<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mượn - Trả Sách</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- JS -->
<script src="thu_thu_3.js" defer></script>

<style>

/* ===== Scrollbar ===== */
::-webkit-scrollbar{
width:8px;
height:8px;
}

::-webkit-scrollbar-track{
background:#f1f5f9;
border-radius:10px;
}

::-webkit-scrollbar-thumb{
background:#cbd5e1;
border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
background:#94a3b8;
}

/* ===== Body ===== */
body{
background:linear-gradient(135deg,#f0f4ff 0%,#e2e8f0 100%);
font-family:'Inter','Segoe UI',sans-serif;
color:#334155;
}

/* ===== Card animation ===== */
.card{
opacity:0;
transform:translateY(30px);
animation:slideUpFade 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
}

.card:nth-child(3){
animation-delay:.15s;
}

@keyframes slideUpFade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ===== Input effect ===== */
input{
transition:all .3s cubic-bezier(.4,0,.2,1);
}

input:focus{
outline:none;
transform:translateY(-2px);
box-shadow:
0 10px 15px -3px rgba(59,130,246,.15),
0 0 0 3px rgba(59,130,246,.2);
border-color:#3b82f6 !important;
background:#fff !important;
}

/* ===== Table row animation ===== */
tbody tr{
animation:fadeInRow .5s ease-out;
transition:.2s;
}

tbody tr:hover{
background:#f8fafc;
transform:scale(1.005);
box-shadow:0 4px 6px -1px rgba(0,0,0,.05);
position:relative;
z-index:10;
}

@keyframes fadeInRow{
from{
opacity:0;
transform:translateX(-10px);
}
to{
opacity:1;
transform:translateX(0);
}
}

</style>
</head>

<body class="min-h-screen p-6 md:p-10 selection:bg-blue-200 selection:text-blue-900">

<!-- ===== Title ===== -->
<header class="mb-10">
<h1 class="text-4xl md:text-5xl font-extrabold flex items-center gap-4
text-transparent bg-clip-text
bg-gradient-to-r from-blue-700 to-indigo-500
drop-shadow-sm hover:scale-[1.01] transition">

<span class="text-5xl">📚</span>
Quản lý Mượn / Trả Sách

</h1>
</header>


<!-- ===== Borrow Form ===== -->
<section class="card bg-white/90 backdrop-blur-md
p-8 md:p-10 rounded-3xl shadow-xl shadow-blue-900/5
border border-white mb-10">

<h2 class="text-2xl font-bold mb-8 text-slate-800
border-b-2 border-blue-100 pb-3 inline-block">

🔖 Mượn sách

</h2>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">

<input
id="reader"
type="text"
placeholder="Tên độc giả..."
class="input-field"
/>

<input
id="book"
type="text"
placeholder="Tên sách..."
class="input-field"
/>

<input
id="borrowDate"
type="date"
class="input-field cursor-pointer"
/>

<input
id="returnDate"
type="date"
class="input-field cursor-pointer"
/>

</div>

<button
onclick="borrowBook()"
class="mt-10 w-full md:w-auto
bg-gradient-to-r from-blue-600 to-indigo-600
text-white font-semibold
px-10 py-4 rounded-xl
shadow-lg
hover:-translate-y-1
active:translate-y-0
transition flex items-center justify-center gap-2">

<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
d="M12 4v16m8-8H4"/>
</svg>

Xác nhận mượn

</button>

</section>


<!-- ===== Borrow List ===== -->
<section class="card bg-white/90 backdrop-blur-md
p-8 md:p-10 rounded-3xl shadow-xl border border-white">

<h2 class="text-2xl font-bold mb-8 text-slate-800
border-b-2 border-slate-100 pb-3 inline-block">

📋 Danh sách mượn

</h2>

<div class="overflow-x-auto rounded-2xl border border-slate-200">

<table class="w-full border-collapse bg-white">

<thead
class="bg-gradient-to-r
from-slate-800 to-slate-700
text-slate-50">

<tr>

<th class="th">Độc giả</th>
<th class="th">Sách</th>
<th class="th text-center">Ngày mượn</th>
<th class="th text-center">Ngày trả</th>
<th class="th text-center">Trạng thái</th>
<th class="th text-center">Hành động</th>

</tr>

</thead>

<tbody
id="borrowList"
class="text-center divide-y divide-slate-100">

<!-- JS render here -->

</tbody>

</table>

</div>

</section>

</body>
</html>
