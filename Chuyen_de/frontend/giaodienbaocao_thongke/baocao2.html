<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thống kê thư viện</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

.sidebar{
width:220px;
height:100vh;
background:#ffd6e0;
position:fixed;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar ul li{
padding:12px;
border-radius:8px;
cursor:pointer;
margin-bottom:8px;
}

.sidebar ul li:hover{
background:#ffb3c6;
}

.main{
margin-left:240px;
padding:30px;
}

/* cards */

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
text-align:center;
}

.card h3{
color:#777;
}

/* charts */

.chart-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.chart-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<div class="sidebar">

<h2>📚 Library</h2>

<ul>
<li>🏠 Dashboard</li>
<li>📖 Quản lý sách</li>
<li>👥 Người dùng</li>
<li>🔄 Mượn trả</li>
<li>📊 Thống kê</li>
</ul>

</div>

<div class="main">

<h2>📊 Báo cáo thống kê</h2>

<div class="cards">

<div class="card">
<h3>Tổng sách</h3>
<h1>1250</h1>
</div>

<div class="card">
<h3>Người dùng</h3>
<h1>420</h1>
</div>

<div class="card">
<h3>Đang mượn</h3>
<h1>110</h1>
</div>

<div class="card">
<h3>Quá hạn</h3>
<h1>15</h1>
</div>

</div>

<div class="chart-container">

<div class="chart-box">
<h3>Sách mượn theo tháng</h3>
<canvas id="barChart"></canvas>
</div>

<div class="chart-box">
<h3>Tỉ lệ sách theo thể loại</h3>
<canvas id="pieChart"></canvas>
</div>

<div class="chart-box">
<h3>Xu hướng mượn sách</h3>
<canvas id="lineChart"></canvas>
</div>

</div>

</div>

<script>

/* biểu đồ cột */

new Chart(document.getElementById("barChart"),{
type:'bar',
data:{
labels:["T1","T2","T3","T4","T5","T6"],
datasets:[{
label:"Số lượt mượn",
data:[40,60,55,80,95,110],
backgroundColor:"#ff8fab"
}]
}
});

/* biểu đồ tròn */

new Chart(document.getElementById("pieChart"),{
type:'pie',
data:{
labels:["CNTT","Kinh tế","Văn học","Khoa học"],
datasets:[{
data:[40,25,20,15],
backgroundColor:[
"#ff8fab",
"#ffc2d1",
"#ffb3c6",
"#fb6f92"
]
}]
}
});

/* biểu đồ đường */

new Chart(document.getElementById("lineChart"),{
type:'line',
data:{
labels:["T1","T2","T3","T4","T5","T6"],
datasets:[{
label:"Xu hướng mượn",
data:[30,50,45,70,90,100],
borderColor:"#ff4d6d",
fill:false,
tension:0.3
}]
}
});

</script>

</body>
</html>
