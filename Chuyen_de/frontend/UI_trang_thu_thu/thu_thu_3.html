<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mượn Trả Sách</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="thu_thu_3.js" defer></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e2e8f0 100%);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: #334155;
        }

        .card {
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .card:nth-child(3) { animation-delay: 0.15s; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input:focus {
            outline: none;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.15), 0 0 0 3px rgba(59, 130, 246, 0.2) !important;
            border-color: #3b82f6 !important;
            background-color: #ffffff !important;
        }

        tbody tr {
            animation: fadeInRow 0.5s ease-out;
            transition: all 0.2s ease;
        }
        tbody tr:hover {
            background-color: #f8fafc;
            transform: scale(1.005);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            z-index: 10;
            position: relative;
        }

        @keyframes fadeInRow {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>

<body class="min-h-screen p-6 md:p-10 selection:bg-blue-200 selection:text-blue-900">

    <h1 class="text-4xl md:text-5xl font-extrabold mb-10 flex items-center gap-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-indigo-500 drop-shadow-sm transition-all hover:scale-[1.01] duration-300">
        <span class="text-5xl drop-shadow-md">📚</span> Quản lý Mượn / Trả Sách
    </h1>

    <div class="card bg-white/90 backdrop-blur-md p-8 md:p-10 rounded-3xl shadow-xl shadow-blue-900/5 border border-white mb-10">
        <h2 class="text-2xl font-bold mb-8 text-slate-800 border-b-2 border-blue-100 pb-3 inline-block">🔖 Mượn sách</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
            <input id="reader" type="text" placeholder="Tên độc giả..." class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl text-slate-700 placeholder-slate-400">
            <input id="book" type="text" placeholder="Tên sách..." class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl text-slate-700 placeholder-slate-400">
            <input id="borrowDate" type="date" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl text-slate-700 cursor-pointer">
            <input id="returnDate" type="date" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl text-slate-700 cursor-pointer">
        </div>
        <button onclick="borrowBook()" class="mt-10 w-full md:w-auto bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold px-10 py-4 rounded-xl shadow-lg hover:-translate-y-1 active:translate-y-0 transition-all duration-300 flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Xác nhận mượn
        </button>
    </div>

    <div class="card bg-white/90 backdrop-blur-md p-8 md:p-10 rounded-3xl shadow-xl border border-white">
        <h2 class="text-2xl font-bold mb-8 text-slate-800 border-b-2 border-slate-100 pb-3 inline-block">📋 Danh sách mượn</h2>
        <div class="overflow-x-auto rounded-2xl border border-slate-200">
            <table class="w-full border-collapse bg-white">
                <thead class="bg-gradient-to-r from-slate-800 to-slate-700 text-slate-50">
                    <tr>
                        <th class="p-5 text-left font-semibold tracking-wide text-sm uppercase">Độc giả</th>
                        <th class="p-5 text-left font-semibold tracking-wide text-sm uppercase">Sách</th>
                        <th class="p-5 text-center font-semibold tracking-wide text-sm uppercase">Ngày mượn</th>
                        <th class="p-5 text-center font-semibold tracking-wide text-sm uppercase">Ngày trả</th>
                        <th class="p-5 text-center font-semibold tracking-wide text-sm uppercase">Trạng thái</th>
                        <th class="p-5 text-center font-semibold tracking-wide text-sm uppercase">Hành động</th>
                    </tr>
                </thead>
                <tbody id="borrowList" class="text-center divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </div>
</body>
</html>
