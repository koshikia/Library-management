<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admin Dashboard - Quản lý người dùng</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI, Arial;
}

body{
display:flex;
background:#f4f6f9;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#1e293b;
color:white;
padding:25px 15px;
}

.sidebar h2{
margin-bottom:30px;
font-size:20px;
text-align:center;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:12px;
border-radius:6px;
margin-bottom:8px;
cursor:pointer;
}

.sidebar li:hover{
background:#334155;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* HEADER */

.header{
font-size:22px;
font-weight:bold;
margin-bottom:25px;
color:#1e293b;
}

/* DASHBOARD LAYOUT */

.dashboard{
display:flex;
gap:25px;
align-items:flex-start;
}

/* CARD */

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* FORM */

form{
width:300px;
}

form h3{
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

input:focus,select:focus{
outline:none;
border-color:#2563eb;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

/* ADD BUTTON */

form button{
background:#22c55e;
color:white;
width:100%;
}

form button:hover{
background:#16a34a;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}

th{
background:#f1f5f9;
}

/* ACTION BUTTON */

.btn-edit{
background:#3b82f6;
color:white;
}

.btn-delete{
background:#ef4444;
color:white;
}

.btn-edit:hover{
background:#2563eb;
}

.btn-delete:hover{
background:#dc2626;
}

/* TABLE CARD */

.table-card{
flex:1;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Admin Panel</h2>

<ul>

<li>Dashboard</li>
<li style="background:#334155">Quản lý User</li>
<li>Quản lý Sách</li>
<li>Thống kê</li>
<li>Đăng xuất</li>

</ul>

</div>


<!-- MAIN -->

<div class="main">

<div class="header">
Quản lý người dùng
</div>

<div class="dashboard">

<!-- FORM -->

<div class="card">

<form id="formAddUser">

<h3>Thêm người dùng</h3>

<input name="hoTen" placeholder="Họ tên" required>

<input name="email" placeholder="Email" required>

<input name="matKhau" placeholder="Mật khẩu" required>

<select name="vaiTro">

<option value="DOCGIA">Độc giả</option>
<option value="THUTHU">Thủ thư</option>
<option value="ADMIN">Admin</option>

</select>

<button type="submit">Thêm người dùng</button>

</form>

</div>


<!-- TABLE -->

<div class="card table-card">

<h3>Danh sách người dùng</h3>

<table>

<thead>

<tr>

<th>ID</th>
<th>Họ tên</th>
<th>Email</th>
<th>Vai trò</th>
<th>Chức năng</th>

</tr>

</thead>

<tbody id="userTable"></tbody>

</table>

</div>

</div>

</div>

<script>
loadUsers();

async function loadUsers(){

const res = await fetch("/api/users");

console.log(res);

const users = await res.json();

console.log(users);

const table = document.getElementById("userTable");

table.innerHTML="";

users.forEach(user=>{
table.innerHTML += `
<tr>
<td>${user.id}</td>
<td>${user.hoTen}</td>
<td>${user.email}</td>
<td>${user.vaiTro}</td>
<td>
<button class="btn-edit" onclick="editUser(${user.id})">Sửa</button>
<button class="btn-delete" onclick="deleteUser(${user.id})">Xóa</button>
</td>
</tr>
`;
});

}

document.getElementById("formAddUser").onsubmit = async function(e){

e.preventDefault();

const data = {
hoTen: this.hoTen.value,
email: this.email.value,
matKhau: this.matKhau.value,
vaiTro: this.vaiTro.value
};

await fetch("/api/users",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(data)
});

alert("Đã thêm người dùng");

this.reset();

loadUsers();

};

async function deleteUser(id){

if(!confirm("Bạn có chắc muốn xóa user này?")) return;

await fetch("/api/users/"+id,{
method:"DELETE"
});

loadUsers();

}

async function editUser(id){

const hoTen = prompt("Nhập họ tên mới:");
const email = prompt("Nhập email mới:");
const vaiTro = prompt("Nhập vai trò (DOCGIA | THUTHU | ADMIN)");

fetch("/api/users/" + id,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
hoTen:hoTen,
email:email,
vaiTro:vaiTro
})
})
.then(res=>res.json())
.then(data=>{
alert(data.message);
loadUsers();
});

}

</script>

</body>
</html>
