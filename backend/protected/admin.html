<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Quản lý người dùng</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI, Arial;
}
body{
display:flex;
background:#f4f6f9;
height:100vh;
}
.main{
flex:1;
padding:30px;
}
.header{
font-size:22px;
font-weight:bold;
margin-bottom:25px;
color:#1e293b;
}
.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}
button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}
th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}
th{
background:#f1f5f9;
}
.btn-edit{
background:#3b82f6;
color:white;
}
.btn-delete{
background:#ef4444;
color:white;
}
.btn-edit:hover{
background:#2563eb;
}
.btn-delete:hover{
background:#dc2626;
}
.table-card{
flex:1;
}
</style>
</head>
<body>
    <div class="main">
    <div class="header"> Quản lý người dùng </div>
    <div class="dashboard">
    <div class="card table-card">
        <h3>Danh sách người dùng</h3>
        <table>
        <thead>
            <tr>
            <th>ID</th>
            <th>Họ tên</th>
            <th>Email</th>
            <th>Vai trò</th>
            <th>Chức năng</th>
            </tr>
        </thead>
        <tbody id="userTable"></tbody>
        </table>
    </div>
    </div>
    </div>
<script>
loadUsers();
async function loadUsers(){

const res = await fetch("/api/users");

console.log(res);

const users = await res.json();

console.log(users);

const table = document.getElementById("userTable");

table.innerHTML="";

users.forEach(user=>{
table.innerHTML += `
<tr>
<td>${user.id}</td>
<td>${user.hoTen}</td>
<td>${user.email}</td>
<td>${user.vaiTro}</td>
<td>
<button class="btn-edit" onclick="editUser(${user.id})">Sửa</button>
<button class="btn-delete" onclick="deleteUser(${user.id})">Xóa</button>
</td>
</tr>
`;
});

}

async function deleteUser(id){

if(!confirm("Bạn có chắc muốn xóa user này?")) return;

await fetch("/api/users/"+id,{
method:"DELETE"
});

loadUsers();

}

async function editUser(id){

const hoTen = prompt("Nhập họ tên mới:");
const email = prompt("Nhập email mới:");
const vaiTro = prompt("Nhập vai trò (DOCGIA | THUTHU | ADMIN)");

fetch("/api/users/" + id,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
hoTen:hoTen,
email:email,
vaiTro:vaiTro
})
})
.then(res=>res.json())
.then(data=>{
alert(data.message);
loadUsers();
});

}

</script>

</body>
</html>
